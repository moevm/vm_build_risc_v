# Extra kernel config for TH1520 / Lichee Pi 4A

# TH1520 SoC support
CONFIG_ARCH_XUANTIE=y

# Core subsystems required for console output (th1520_defconfig disables these via EXPERT)
CONFIG_PRINTK=y
CONFIG_TTY=y
CONFIG_BUG=y
CONFIG_SERIAL_CORE=y
CONFIG_SERIAL_CORE_CONSOLE=y

# UART / serial console
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_8250_DW=y
CONFIG_SERIAL_8250_NR_UARTS=4
CONFIG_SERIAL_8250_RUNTIME_UARTS=4
CONFIG_SERIAL_OF_PLATFORM=y
CONFIG_SERIAL_EARLYCON=y
CONFIG_HVC_RISCV_SBI=n
CONFIG_SERIAL_EARLYCON_RISCV_SBI=n

# Networking
CONFIG_NET=y
CONFIG_INET=y
CONFIG_IPV6=y
CONFIG_NETDEVICES=y
CONFIG_ETHERNET=y
CONFIG_STMMAC_ETH=y
CONFIG_STMMAC_PLATFORM=y

# USB 
CONFIG_USB=y
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_HOST=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_STORAGE=y

# WiFi
CONFIG_WIRELESS=y
CONFIG_CFG80211=m
CONFIG_MAC80211=m
CONFIG_WLAN=y

# Filesystem
CONFIG_EXT4_FS=y
CONFIG_TMPFS=y
CONFIG_PROC_FS=y
CONFIG_SYSFS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y

# SSH / debugging
CONFIG_UNIX=y
CONFIG_PACKET=y
CONFIG_NETFILTER=y
CONFIG_CRYPTO=y

# TEMP
CONFIG_DEBUG_INFO_BTF=n
CONFIG_INPUT=y
CONFIG_INPUT_EVDEV=y
CONFIG_DEVFREQ_THERMAL=y
CONFIG_SECURITY_GHOSTWRITE=n
CONFIG_HALL_MH248=n
CONFIG_RISCV_ISA_GHOSTWRITE=n
CONFIG_DEVFREQ_THERMAL=y
CONFIG_THERMAL=y
CONFIG_RISCV_ISA_VENDOR_EXT_THEAD=y
CONFIG_RISCV_ISA_V=y
CONFIG_FPU=y
CONFIG_RISCV_ISA_XTHEADVECTOR=y
CONFIG_GENERIC_CPU_VULNERABILITIES=y
CONFIG_ERRATA_THEAD=y
CONFIG_ERRATA_THEAD_GHOSTWRITE=y

# HDMI framebuffer console
CONFIG_VT=y
CONFIG_VT_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_DRM_FBDEV_EMULATION=y

# Disable GPU drivers that fail to build
CONFIG_DRM_IMG_ROGUE_GPUTRACE=n
CONFIG_DRM_POWERVR_ROGUE=n

CONFIG_MMC=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_PLTFM=y
CONFIG_CMDLINE_PARTITION=y
