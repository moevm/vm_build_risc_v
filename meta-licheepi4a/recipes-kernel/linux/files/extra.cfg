# Extra kernel config for TH1520 / Lichee Pi 4A

# TH1520 SoC support
CONFIG_ARCH_XUANTIE=y

# Networking
CONFIG_NET=y
CONFIG_INET=y
CONFIG_IPV6=y
CONFIG_NETDEVICES=y
CONFIG_ETHERNET=y
CONFIG_STMMAC_ETH=y
CONFIG_STMMAC_PLATFORM=y

# USB 
CONFIG_USB=y
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_HOST=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_STORAGE=y

# WiFi
CONFIG_WIRELESS=y
CONFIG_CFG80211=m
CONFIG_MAC80211=m
CONFIG_WLAN=y

# Filesystem
CONFIG_EXT4_FS=y
CONFIG_TMPFS=y
CONFIG_PROC_FS=y
CONFIG_SYSFS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y

# SSH / debugging
CONFIG_UNIX=y
CONFIG_PACKET=y
CONFIG_NETFILTER=y
CONFIG_CRYPTO=y