#@TYPE: Machine
#@NAME: Lichee Pi 4A
#@DESCRIPTION: Machine configuration for Lichee Pi 4A (T-Head TH1520 SoC)

require conf/machine/include/riscv/tune-riscv.inc

DEFAULTTUNE = "riscv64"
TUNE_FEATURES:tune-riscv64 = "riscv64"

MACHINE_FEATURES = "screen keyboard usbhost usbgadget wifi bluetooth ext2 ext3 serial ethernet hdmi"

PREFERRED_PROVIDER_virtual/kernel = "linux-revyos-th1520"
KERNEL_IMAGETYPE = "Image"
KERNEL_DEVICETREE = "thead/th1520-lichee-pi-4a-16g.dtb"

PREFERRED_PROVIDER_virtual/bootloader = "u-boot-thead"
UBOOT_MACHINE = "light_lpi4a_defconfig"

RISCV_SBI_PLAT = "generic"
RISCV_SBI_FDT = "thead/th1520-lichee-pi-4a-16g.dtb"

EXTRA_IMAGEDEPENDS += "opensbi-thead firmware-th1520 u-boot-thead"

SERIAL_CONSOLES = "115200;ttyS0"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    kernel-modules \
"

IMAGE_FSTYPES = "ext4 wic.gz"
IMAGE_BOOT_FILES = " \
    fw_dynamic.bin \
    ${KERNEL_IMAGETYPE} \
    th1520-lichee-pi-4a-16g.dtb \
    light_aon_fpga.bin \
"

WKS_FILE ?= "licheepi4a-sdcard.wks"
WIC_CREATE_EXTRA_ARGS ?= "--no-fstab-update"
WKS_FILE_DEPENDS ?= " \
    opensbi-thead \
    e2fsprogs-native \
    bmaptool-native \
"

MACHINEOVERRIDES =. "licheepi4a:"